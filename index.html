<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التطبيقات الذكي | Premium Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .app-card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); border-color: #38bdf8; }
    </style>
</head>
<body>
    <header class="py-10 text-center border-b border-slate-800 bg-slate-900/50">
        <h1 class="text-4xl font-bold text-sky-400">مستودع التطبيقات الاحترافي</h1>
        <p class="text-slate-400 mt-2">تحديثات تلقائية بواسطة الذكاء الاصطناعي</p>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div id="apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        async function loadData() {
            try {
                const res = await fetch('data.json');
                const apps = await res.json();
                const grid = document.getElementById('apps-grid');
                grid.innerHTML = apps.map(app => `
                    <div class="app-card rounded-2xl p-6 shadow-xl">
                        <img src="${app.image}" class="w-20 h-20 rounded-2xl mb-4 border-2 border-sky-500/30 object-cover">
                        <h2 class="text-xl font-bold mb-2">${app.name}</h2>
                        <p class="text-slate-400 text-sm mb-6 leading-relaxed">${app.description}</p>
                        <a href="${app.link}" target="_blank" class="block text-center bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl transition">تحميل مباشر APK</a>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('apps-grid').innerHTML = '<p class="text-center col-span-full">لا توجد تطبيقات منشورة بعد، البوت يعمل حالياً...</p>';
            }
        }
        loadData();
    </script>
</body>
</html>
